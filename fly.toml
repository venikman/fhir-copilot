# fly.toml app configuration file generated for fhir-copilot on 2026-03-18T01:07:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fhir-copilot'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[env]
  OTEL_SERVICE_NAME = "fhir-copilot"
  OTEL_RESOURCE_ATTRIBUTES = "deployment.environment=production"
  # Set OTEL_EXPORTER_OTLP_ENDPOINT via `fly secrets set` to enable OTLP export
  # Example: fly secrets set OTEL_EXPORTER_OTLP_ENDPOINT=https://otel-collector.example.com:4317

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[checks]]
  name = "health"
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  port = 8080
  timeout = "5s"
  type = "http"
