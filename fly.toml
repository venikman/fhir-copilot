app = 'fhir-copilot'
primary_region = 'iad'

[build]

[env]
  Provider__Mode = 'Gemini'
  Provider__GeminiModel = 'gemini-3.1-flash'
  Provider__FhirBaseUrl = 'https://bulk-atr.nedbailov375426.workers.dev/fhir'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
